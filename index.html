<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conservation News</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #f7f5f2; /* Warm off-white */
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; height: 100vh; align-items: center; 
        }

        .carousel-container { 
            width: 100%; max-width: 450px; overflow: hidden; position: relative; 
            background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; width: 100%; }
        
        .news-card { 
            min-width: 100%; height: 600px; 
            background-color: #d1ccc0; /* Neutral warm fallback */
            background-size: cover; background-position: center; 
            position: relative; display: flex; flex-direction: column; justify-content: flex-end; 
        }
        
        .card-info { background: white; padding: 25px; color: #36454f; /* Anthracite Text */ }
        .date { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 12px; }
        h2 { margin: 0 0 25px 0; font-size: 1.5rem; line-height: 1.3; font-weight: 600; color: #36454f; }
        
        .meta-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
        .category-group { display: flex; gap: 10px; }
        
        /* Category Beam Colors */
        .category { font-size: 0.7rem; font-weight: bold; border-bottom: 3px solid; padding-bottom: 4px; text-transform: uppercase; }
        .cat-oceans { color: #1a365d; border-color: #1a365d; }      /* Dark Blue */
        .cat-communities { color: #63b3ed; border-color: #63b3ed; } /* Light Blue */
        .cat-climate { color: #ed8936; border-color: #ed8936; }    /* Orange */
        .cat-biodiversity { color: #48bb78; border-color: #48bb78; }/* Green */
        .cat-science { color: #f56565; border-color: #f56565; }    /* Red */
        
        .read-time { font-size: 0.75rem; color: #36454f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack"></div>
    </div>

    <script>
        const rssUrl = "https://feeds.feedburner.com/ConservationInternationalBlog";
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        // Map categories to your specific warm color beams
        function getCategoryClass(catName) {
            const name = catName.toLowerCase();
            if (name.includes('ocean')) return 'cat-oceans';
            if (name.includes('communit')) return 'cat-communities';
            if (name.includes('climate')) return 'cat-climate';
            if (name.includes('biodivers')) return 'cat-biodiversity';
            if (name.includes('science')) return 'cat-science';
            return 'cat-biodiversity'; // Default
        }

        async function loadNews() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const track = document.getElementById('carouselTrack');
                track.innerHTML = '';

                data.items.slice(0, 5).forEach((item) => {
                    // 1. Try to find real image
                    let imgUrl = item.enclosure?.link || item.thumbnail || "";
                    
                    // 2. Fallback to placeholder if no image found (using Unsplash for professional look)
                    if (!imgUrl) {
                        imgUrl = `https://source.unsplash.com/random/400x600/?nature,conservation&sig=${Math.random()}`;
                    }

                    const wordCount = (item.content || item.description || "").split(/\s+/).length;
                    const minutes = Math.ceil(wordCount / 200);

                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('${imgUrl}')`;
                    
                    const catHtml = (item.categories || ['Biodiversity']).slice(0, 1).map(cat => 
                        `<span class="category ${getCategoryClass(cat)}">${cat}</span>`
                    ).join('');

                    card.innerHTML = `
                        <div class="card-info">
                            <div class="date">${new Date(item.pubDate).toLocaleDateString()}</div>
                            <h2>${item.title}</h2>
                            <div class="meta-footer">
                                <div class="category-group">${catHtml}</div>
                                <div class="read-time">${minutes} MIN READ</div>
                            </div>
                        </div>
                    `;
                    track.appendChild(card);
                });
                startRotation();
            } catch (err) { console.error("Error loading feed:", err); }
        }

        function startRotation() {
            const track = document.getElementById('carouselTrack');
            let index = 0;
            const slides = document.querySelectorAll('.news-card');
            if (slides.length > 0) {
                setInterval(() => {
                    index = (index + 1) % slides.length;
                    track.style.transform = `translateX(-${index * 100}%)`;
                }, 5000);
            }
        }

        loadNews();
    </script>
</body>
</html>
