<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conservation News Feed</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #f7f5f2; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; height: 100vh; align-items: center; 
        }

        .carousel-container { 
            width: 100%; max-width: 450px; overflow: hidden; position: relative; 
            background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; width: 100%; }
        
        .news-card { 
            min-width: 100%; height: 600px; 
            background-color: #d1ccc0; 
            background-size: cover; background-position: center; 
            position: relative; display: flex; flex-direction: column; justify-content: flex-end; 
        }
        
        .card-info { background: white; padding: 25px; color: #36454f; }
        .date { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 12px; }
        h2 { margin: 0 0 25px 0; font-size: 1.5rem; line-height: 1.3; font-weight: 600; color: #36454f; }
        
        .meta-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
        .category-group { display: flex; gap: 10px; }
        
        /* Category Beam Colors */
        .category { font-size: 0.7rem; font-weight: bold; border-bottom: 3px solid; padding-bottom: 4px; text-transform: uppercase; }
        .cat-oceans { color: #1a365d; border-color: #1a365d; }      /* Dark Blue */
        .cat-communities { color: #63b3ed; border-color: #63b3ed; } /* Light Blue */
        .cat-climate { color: #ed8936; border-color: #ed8936; }    /* Orange */
        .cat-biodiversity { color: #48bb78; border-color: #48bb78; }/* Green */
        .cat-science { color: #f56565; border-color: #f56565; }    /* Red */
        
        .read-time { font-size: 0.75rem; color: #36454f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack">
            <p style="padding: 20px; text-align: center;">Loading feed...</p>
        </div>
    </div>

    <script>
        const feedUrl = "https://www.conservation.org/feed.json";
        // Using AllOrigins proxy to bypass CORS restrictions
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`;

        function getCategoryClass(category) {
            const name = category.toLowerCase();
            if (name.includes('ocean')) return 'cat-oceans';
            if (name.includes('communit')) return 'cat-communities';
            if (name.includes('climate')) return 'cat-climate';
            if (name.includes('biodivers')) return 'cat-biodiversity';
            if (name.includes('science')) return 'cat-science';
            return 'cat-biodiversity';
        }

        async function loadNews() {
            try {
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const data = JSON.parse(json.contents); // The proxy wraps the content
                
                const track = document.getElementById('carouselTrack');
                track.innerHTML = '';

                data.items.slice(0, 5).forEach((item) => {
                    // Try extracted image -> banner_image -> fallback
                    let imgUrl = item.image || item.banner_image || `https://source.unsplash.com/random/400x600/?nature,conservation&sig=${Math.random()}`;

                    const wordCount = (item.content_text || "").split(/\s+/).length || 500;
                    const minutes = Math.ceil(wordCount / 200);

                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('${imgUrl}')`;
                    
                    const category = (item.tags && item.tags.length > 0) ? item.tags[0] : "Conservation";
                    
                    card.innerHTML = `
                        <div class="card-info">
                            <div class="date">${new Date(item.date_published).toLocaleDateString()}</div>
                            <h2>${item.title}</h2>
                            <div class="meta-footer">
                                <div class="category-group">
                                    <span class="category ${getCategoryClass(category)}">${category}</span>
                                </div>
                                <div class="read-time">${minutes} MIN READ</div>
                            </div>
                        </div>
                    `;
                    track.appendChild(card);
                });
                
                // Initialize Carousel
                startRotation();
            } catch (err) { 
                console.error("Error:", err);
                document.getElementById('carouselTrack').innerHTML = '<p style="padding:20px;">Could not load news. Please try again.</p>';
            }
        }

        function startRotation() {
            const track = document.getElementById('carouselTrack');
            let index = 0;
            const slides = document.querySelectorAll('.news-card');
            if (slides.length > 0) {
                setInterval(() => {
                    index = (index + 1) % slides.length;
                    track.style.transform = `translateX(-${index * 100}%)`;
                }, 5000);
            }
        }

        loadNews();
    </script>
</body>
</html>
