<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conservation News Feed</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; display: flex; justify-content: center; }

        .carousel-container {
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            position: relative;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 100%;
        }

        .news-card {
            min-width: 100%;
            height: 600px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pushes content to bottom */
        }

        .card-info {
            background: white;
            padding: 20px;
            color: #333;
        }

        .date { font-size: 0.75rem; color: #666; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
        h2 { margin: 0 0 20px 0; font-size: 1.4rem; line-height: 1.3; }

        .meta-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
        .categories { display: flex; gap: 10px; }

        /* Specific colors for different categories */
        .category { font-size: 0.7rem; font-weight: bold; border-bottom: 2px solid; padding-bottom: 2px; }
        .cat-biodiversity { color: #2d5a27; border-color: #2d5a27; }
        .cat-climate { color: #2563eb; border-color: #2563eb; } /* Blue */
        .cat-oceans { color: #0891b2; border-color: #0891b2; } /* Teal */

        .time { font-size: 0.8rem; color: #666; display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack">
            
            <!-- Story 1 -->
            <div class="news-card" style="background-image: url('image.png');">
                <div class="card-info">
                    <div class="date">June 16, 2026</div>
                    <h2>Inside the ancient traditions saving nature's last strongholds</h2>
                    <div class="meta-footer">
                        <div class="categories">
                            <span class="category cat-biodiversity">BIODIVERSITY</span>
                            <span class="category cat-climate">CLIMATE</span>
                        </div>
                        <div class="time">⏱ 8 MIN</div>
                    </div>
                </div>
            </div>

            <!-- Story 2 -->
            <div class="news-card" style="background-image: url('image_2.png');">
                <div class="card-info">
                    <div class="date">June 9, 2026</div>
                    <h2>The world just gained a marine protected area the size of France</h2>
                    <div class="meta-footer">
                        <div class="categories">
                            <span class="category cat-oceans">OCEANS</span>
                        </div>
                        <div class="time">⏱ 5 MIN</div>
                    </div>
                </div>
            </div>

            <!-- Story 3 -->
            <div class="news-card" style="background-image: url('image_3.png');">
                <div class="card-info">
                    <div class="date">June 15, 2026</div>
                    <h2>Next headline goes here</h2>
                    <div class="meta-footer">
                        <div class="categories">
                            <span class="category cat-biodiversity">BIODIVERSITY</span>
                        </div>
                        <div class="time">⏱ 4 MIN</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const track = document.getElementById('carouselTrack');
        let index = 0;
        const totalSlides = document.querySelectorAll('.news-card').length;
        
        function rotate() {
            index = (index + 1) % totalSlides;
            track.style.transform = `translateX(-${index * 100}%)`;
        }
        
        setInterval(rotate, 5000); 
    </script>
</body>
</html>
