<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conservation News Feed</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f7f5f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 450px; height: 600px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .card { min-width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; }
        .info { background: white; padding: 25px; color: #36454f; }
        h2 { font-size: 1.4rem; margin: 0 0 15px 0; }
        .meta { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 15px; font-weight: bold; font-size: 0.75rem; }
        .category { border-bottom: 3px solid; padding-bottom: 4px; }
        .cat-oceans { color: #1a365d; border-color: #1a365d; }
        .cat-biodiversity { color: #48bb78; border-color: #48bb78; }
    </style>
</head>
<body>
    <div class="container">
        <div class="track" id="track"></div>
    </div>

    <script>
        const feedUrl = "https://www.conservation.org/feed.json";
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`;

        async function init() {
            try {
                const res = await fetch(proxyUrl);
                const data = JSON.parse((await res.json()).contents);
                const track = document.getElementById('track');
                
                data.items.slice(0, 5).forEach(item => {
                    // Fallback to Unsplash if no image exists in feed
                    const img = item.image || item.banner_image || `https://source.unsplash.com/random/400x600/?nature,conservation&sig=${Math.random()}`;
                    const cat = item.tags?.[0] || "Conservation";
                    
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('${img}')`;
                    div.innerHTML = `
                        <div class="info">
                            <h2>${item.title}</h2>
                            <div class="meta">
                                <span class="category ${cat.toLowerCase().includes('ocean') ? 'cat-oceans' : 'cat-biodiversity'}">${cat}</span>
                                <span>${Math.ceil((item.content_text?.length || 500) / 1000)} MIN READ</span>
                            </div>
                        </div>
                    `;
                    track.appendChild(div);
                });
                
                let i = 0;
                setInterval(() => {
                    i = (i + 1) % 5;
                    document.getElementById('track').style.transform = `translateX(-${i * 100}%)`;
                }, 5000);
            } catch (e) {
                document.body.innerHTML = "Check connection...";
            }
        }
        init();
    </script>
</body>
</html>
