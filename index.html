<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaturePL Stories</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #video-container { width: 100vw; height: 100vh; position: relative; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; }
        
        #progress-container { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 10; }
        .progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; width: 0%; }

        #overlay { position: absolute; bottom: 50px; left: 20px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10; }
        
        .nav-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 5; cursor: pointer; }
        #nav-left { left: 0; }
        #nav-right { right: 0; }
    </style>
</head>
<body>

    <div id="progress-container"></div>
    <div id="video-container">
        <video id="bg-video" muted playsinline></video>
        <div id="overlay">
            <h1 id="title">Loading videos...</h1>
        </div>
    </div>

    <div id="nav-left" class="nav-zone" onclick="changeStory(-1)"></div>
    <div id="nav-right" class="nav-zone" onclick="changeStory(1)"></div>

    <script>
        const PAGE_URL = 'https://www.naturepl.com/blog/2024/05/04/video-eyecatchers/';
        const PROXY = 'https://api.allorigins.win/get?url=';
        let stories = [];
        let currentIndex = 0;
        const DURATION = 8000;

        async function fetchVideos() {
            try {
                const response = await fetch(PROXY + encodeURIComponent(PAGE_URL));
                const data = await response.json();
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");
                
                // NaturePL uses <video> tags in blog posts. We scrape them.
                const videoElements = doc.querySelectorAll('video');
                stories = Array.from(videoElements).map(v => {
                    const source = v.querySelector('source')?.src || v.src;
                    return {
                        url: source,
                        title: "Nature Video"
                    };
                }).filter(s => s.url);

                if (stories.length > 0) init();
                else document.getElementById('title').innerText = "No videos found.";
            } catch (e) {
                document.getElementById('title').innerText = "Error loading page.";
            }
        }

        function init() {
            const container = document.getElementById('progress-container');
            stories.forEach((_, i) => {
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${i}"></div>`;
                container.appendChild(bar);
            });
            showStory(0);
        }

        function showStory(index) {
            currentIndex = index;
            const video = document.getElementById('bg-video');
            video.src = stories[index].url;
            video.load();
            video.play();
            
            document.querySelectorAll('.progress-fill').forEach((f, i) => {
                f.style.width = i < index ? '100%' : '0%';
            });
            
            animateBar(index);
        }

        function animateBar(index) {
            const fill = document.getElementById(`fill-${index}`);
            fill.style.transition = `width ${DURATION}ms linear`;
            fill.style.width = '100%';
            
            setTimeout(() => {
                if (currentIndex === index) {
                    changeStory(1);
                }
            }, DURATION);
        }

        function changeStory(dir) {
            let next = currentIndex + dir;
            if (next >= 0 && next < stories.length) showStory(next);
        }

        fetchVideos();
    </script>
</body>
</html>
