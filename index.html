<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Viewer</title>
    <style>
        :root { --accent: #e3120b; --background: #000; --text-white: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--background); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        #story-container { 
            width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; justify-content: flex-end; color: var(--text-white);
            background-size: cover; background-position: center; transition: background-image 0.5s ease;
            background-color: var(--accent);
        }
        
        #progress-container { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 10; }
        .progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--text-white); width: 0%; }

        #content-area { padding: 40px; padding-bottom: 100px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        h1 { font-size: 2rem; margin-bottom: 15px; line-height: 1.2; }
        p { font-size: 1.1rem; opacity: 0.9; line-height: 1.6; }
        #read-btn { display: inline-block; margin-top: 20px; padding: 12px 25px; border: 1px solid var(--text-white); color: var(--text-white); text-decoration: none; font-weight: bold; cursor: pointer; }
        
        .nav-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 5; }
        #nav-left { left: 0; cursor: w-resize; }
        #nav-right { right: 0; cursor: e-resize; }
    </style>
</head>
<body>

    <div id="progress-container"></div>
    <div id="story-container">
        <div id="content-area">
            <h1 id="title">Loading...</h1>
            <p id="description"></p>
            <a id="read-btn" href="#" target="_blank">Read Full Article</a>
        </div>
    </div>

    <div id="nav-left" class="nav-zone"></div>
    <div id="nav-right" class="nav-zone"></div>

    <script>
        // Set your RSS Feed URL here
        const RSS_URL = 'https://onetreeplanted.org/blogs/stories.atom'; 
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;
        let stories = [];
        let currentIndex = 0;
        let animationFrame;
        const DURATION = 8000;

        async function fetchRSS() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                stories = data.items.map(item => {
                    // 1. Try to find image in enclosure
                    let imgUrl = item.enclosure ? item.enclosure.link : null;
                    
                    // 2. If not, try finding it in the HTML description
                    if (!imgUrl) {
                        const div = document.createElement('div');
                        div.innerHTML = item.description || item.content || '';
                        const img = div.querySelector('img');
                        imgUrl = img ? img.src : null;
                    }

                    // 3. Apply Image Proxy (critical for blocking issues)
                    const proxyUrl = imgUrl ? `https://images.weserv.nl/?url=${encodeURIComponent(imgUrl)}` : '';

                    return {
                        title: item.title,
                        description: (item.description || item.content || '').replace(/<[^>]*>?/gm, '').substring(0, 150) + "...",
                        link: item.link,
                        image: proxyUrl
                    };
                }).slice(0, 5);
                
                initProgressBars();
                showStory(0);
            } catch (e) {
                document.getElementById('title').innerText = "Error: " + e.message;
            }
        }

        function initProgressBars() {
            const container = document.getElementById('progress-container');
            stories.forEach((_, i) => {
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${i}"></div>`;
                container.appendChild(bar);
            });
        }

        function showStory(index) {
            cancelAnimationFrame(animationFrame);
            currentIndex = index;
            const story = stories[index];
            
            document.getElementById('title').innerText = story.title;
            document.getElementById('description').innerText = story.description;
            document.getElementById('read-btn').href = story.link;
            
            // Set Background
            const container = document.getElementById('story-container');
            if(story.image) {
                container.style.backgroundImage = `linear-gradient(to top, rgba(0,0,0,0.95), transparent), url('${story.image}')`;
            } else {
                container.style.backgroundImage = 'none';
            }
            
            document.querySelectorAll('.progress-fill').forEach((f, i) => {
                f.style.width = i < index ? '100%' : '0%';
            });
            
            let start = null;
            function animate(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / DURATION, 1) * 100;
                document.getElementById(`fill-${index}`).style.width = `${progress}%`;
                
                if (progress < 100) {
                    animationFrame = requestAnimationFrame(animate);
                } else if (currentIndex < stories.length - 1) {
                    showStory(currentIndex + 1);
                }
            }
            animationFrame = requestAnimationFrame(animate);
        }

        document.getElementById('nav-left').onclick = () => { if(currentIndex > 0) showStory(currentIndex - 1); };
        document.getElementById('nav-right').onclick = () => { if(currentIndex < stories.length - 1) showStory(currentIndex + 1); };

        fetchRSS();
    </script>
</body>
</html>
