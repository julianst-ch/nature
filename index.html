<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conservation International Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #app { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .story-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background-size: cover; background-position: center; flex-direction: column; justify-content: flex-end; padding: 2rem; box-sizing: border-box; }
        .story-slide.active { display: flex; }
        .overlay { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding: 2rem; color: white; }
        h1 { font-size: 1.8rem; margin-bottom: 1rem; line-height: 1.2; }
        p { font-size: 1rem; opacity: 0.9; margin-bottom: 2rem; }
        .btn { display: inline-block; background: white; color: black; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }
        #progress-bar { position: absolute; top: 10px; left: 10px; right: 10px; height: 4px; background: rgba(255,255,255,0.3); display: flex; gap: 5px; }
        .progress-segment { flex: 1; background: rgba(255,255,255,0.5); border-radius: 2px; }
        .progress-segment.active { background: white; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>
    <div id="app"></div>

    <script>
        const RSS_URL = 'https://feeds.feedburner.com/ConservationInternationalBlog';
        // Using a CORS proxy to bypass the RSS-feed block
        const PROXY = 'https://api.allorigins.win/get?url=';
        const parser = new RSSParser();
        const app = document.getElementById('app');
        const progressBar = document.getElementById('progress-bar');
        let items = [];
        let currentIndex = 0;

        async function fetchFeed() {
            try {
                const response = await fetch(PROXY + encodeURIComponent(RSS_URL));
                const data = await response.json();
                const feed = await parser.parseString(data.contents);
                items = feed.items.slice(0, 5); // Take the first 5 stories
                render();
            } catch (err) {
                app.innerHTML = `<div style="color:white; padding:20px;">Error loading feed: ${err.message}</div>`;
            }
        }

        function render() {
            items.forEach((item, index) => {
                // Progress segments
                const seg = document.createElement('div');
                seg.className = 'progress-segment';
                progressBar.appendChild(seg);

                // Slides
                const slide = document.createElement('div');
                slide.className = 'story-slide';
                // Using a fallback image if none provided
                slide.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1542601906990-b4d3fb7780b9?auto=format&fit=crop&q=80&w=800')`;
                slide.innerHTML = `
                    <div class="overlay">
                        <h1>${item.title}</h1>
                        <p>${item.contentSnippet ? item.contentSnippet.substring(0, 100) + '...' : ''}</p>
                        <a href="${item.link}" class="btn" target="_blank">Read Article</a>
                    </div>
                `;
                app.appendChild(slide);
            });
            showSlide(0);
        }

        function showSlide(index) {
            document.querySelectorAll('.story-slide').forEach((s, i) => {
                s.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.progress-segment').forEach((s, i) => {
                s.classList.toggle('active', i === index);
            });
        }

        app.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % items.length;
            showSlide(currentIndex);
        });

        fetchFeed();
    </script>
</body>
</html>
