<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conservation News Feed</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; display: flex; justify-content: center; height: 100vh; align-items: center; }
        .carousel-container { width: 100%; max-width: 450px; overflow: hidden; position: relative; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; width: 100%; }
        
        .news-card { min-width: 100%; height: 600px; background-color: #e8f5e9; background-size: cover; background-position: center; background-repeat: no-repeat; position: relative; display: flex; flex-direction: column; justify-content: flex-end; }
        
        .card-info { background: white; padding: 25px; color: #333; }
        .date { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        h2 { margin: 0 0 25px 0; font-size: 1.5rem; line-height: 1.2; font-weight: 600; }
        
        .meta-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
        .category-group { display: flex; gap: 15px; }
        
        /* Category Styling as per image_5.png */
        .category { font-size: 0.7rem; font-weight: bold; border-bottom: 3px solid; padding-bottom: 4px; text-transform: uppercase; }
        .cat-oceans { color: #0066cc; border-color: #0066cc; }
        .cat-climate { color: #e67e22; border-color: #e67e22; }
        .cat-biodiversity { color: #27ae60; border-color: #27ae60; }
        
        .read-time { font-size: 0.8rem; color: #666; font-weight: 500; }
    </style>
</head>
<body>

    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack"></div>
    </div>

    <script>
        const rssUrl = "https://feeds.feedburner.com/ConservationInternationalBlog";
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        // Mapping function for your specific colors
        function getCategoryClass(catName) {
            const name = catName.toLowerCase();
            if (name.includes('ocean')) return 'cat-oceans';
            if (name.includes('climate')) return 'cat-climate';
            if (name.includes('biodiversity') || name.includes('conservation')) return 'cat-biodiversity';
            return 'cat-biodiversity'; // Default
        }

        async function loadNews() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const track = document.getElementById('carouselTrack');
                track.innerHTML = '';

                data.items.slice(0, 5).forEach((item) => {
                    // Estimate Reading Time (avg 200 words/min)
                    const textContent = (item.content || item.description || "").replace(/<[^>]*>?/gm, '');
                    const wordCount = textContent.split(/\s+/).length;
                    const minutes = Math.ceil(wordCount / 200);

                    // Robust image extraction
                    const imgUrl = item.enclosure?.link || item.thumbnail || "";
                    
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    if (imgUrl) card.style.backgroundImage = `url('${imgUrl}')`;
                    
                    // Create Category Spans
                    const catHtml = (item.categories || ['Biodiversity']).slice(0, 2).map(cat => 
                        `<span class="category ${getCategoryClass(cat)}">${cat}</span>`
                    ).join('');

                    card.innerHTML = `
                        <div class="card-info">
                            <div class="date">${new Date(item.pubDate).toLocaleDateString()}</div>
                            <h2>${item.title}</h2>
                            <div class="meta-footer">
                                <div class="category-group">${catHtml}</div>
                                <div class="read-time">${minutes} MIN READ</div>
                            </div>
                        </div>
                    `;
                    track.appendChild(card);
                });
                startRotation();
            } catch (err) { console.error("Error:", err); }
        }

        function startRotation() {
            const track = document.getElementById('carouselTrack');
            let index = 0;
            const slides = document.querySelectorAll('.news-card');
            if (slides.length > 0) {
                setInterval(() => {
                    index = (index + 1) % slides.length;
                    track.style.transform = `translateX(-${index * 100}%)`;
                }, 5000);
            }
        }

        loadNews();
    </script>
</body>
</html>
